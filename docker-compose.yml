services:
  mysql:
    image: mysql:8.4
    container_name: nyc-taxi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nyc_taxi_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nyc-taxi-backend
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5001
      FLASK_DEBUG: "false"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpassword
      MYSQL_DATABASE: nyc_taxi_db
      MYSQL_CHARSET: utf8mb4
      SPARK_LOCAL_IP: 127.0.0.1
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:5001/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nyc-taxi-frontend
    environment:
      BACKEND_BASE_URL: http://backend:5001
    ports:
      - "8502:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s

volumes:
  mysql_data:
